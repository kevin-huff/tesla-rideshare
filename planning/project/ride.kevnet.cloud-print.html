<!doctype html>
<!--
  ride.kevnet.cloud — print preview
  Renders the selected variant (Refined Dark) as a single long mobile page.
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ride.kevnet.cloud — print</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0b0b0d; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: #e8e6e1; }

    /* Frame the mobile design centered, with breathing room on screen */
    .stage { display: flex; justify-content: center; padding: 24px 0; background: #0b0b0d; }
    .device {
      width: 390px;
      background: #0b0b0d;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
      overflow: hidden;
    }

    /* page-level scroll stylings hidden in print */
    .phone-scroll { scrollbar-width: none; }
    .phone-scroll::-webkit-scrollbar { display: none; }

    @page {
      size: 4.5in 11in;
      margin: 0;
    }

    @media print {
      html, body { background: #0b0b0d !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .stage { padding: 0; }
      .device { box-shadow: none; width: 4.5in; }
      /* Avoid splitting key sections across pages where possible */
      section, details, hr { break-inside: avoid; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="photo-placeholder.jsx"></script>
  <script type="text/babel" src="variant-refined.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function PrintApp() {
      return (
        <div className="stage">
          <div className="device">
            <VariantRefined accent="#c084fc" font="system"/>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

    // Auto-print after fonts + JSX have settled
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      await new Promise((r) => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
